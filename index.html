<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>I Love Security | Ferramentas Locais & Privadas</title>

    <script src="https://cdn.tailwindcss.com"></script>

    <link rel="stylesheet" href="/visual/css/style.css">

    <link rel="icon" type="image/png" href="/visual/img/logo.png">

    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
    <script>pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';</script>
</head>

<body class="bg-gray-50 font-sans">

    <nav class="bg-white border-b border-gray-200 px-6 py-4 flex justify-between items-center">
        <a href="/" class="flex items-center gap-3 hover:opacity-75 transition-opacity cursor-pointer">
            <img src="/visual/img/logo.png" alt="I Love Security Logo" class="h-12 w-auto object-contain">

            <span class="text-xl font-bold text-gray-800 uppercase tracking-tighter">
                I Love Security
            </span>
        </a>

        <div class="text-sm text-gray-500 font-medium">
            Ambiente Interno - LGPD Safe
        </div>
    </nav>

    <section class="text-center py-12 px-4">
        <h1 class="text-4xl font-bold text-gray-800 mb-4">Privacidade Total: Ferramentas Locais de PDF</h1>
        <p class="text-lg text-gray-600">Seus dados nunca saem da sua máquina. Segurança e rapidez offline.</p>

        <div class="flex flex-wrap justify-center gap-2 mt-8">
            <button onclick="filterTools('all')"
                class="filter-btn bg-gray-800 text-white px-4 py-2 rounded-full text-sm font-medium hover:bg-gray-700 transition-colors">Todas</button>
            <button onclick="filterTools('organizar')"
                class="filter-btn bg-white text-gray-600 px-4 py-2 rounded-full text-sm font-medium hover:bg-gray-100 transition-colors">Organizar</button>
            <button onclick="filterTools('otimizar')"
                class="filter-btn bg-white text-gray-600 px-4 py-2 rounded-full text-sm font-medium hover:bg-gray-100 transition-colors">Otimizar</button>
            <button onclick="filterTools('converter')"
                class="filter-btn bg-white text-gray-600 px-4 py-2 rounded-full text-sm font-medium hover:bg-gray-100 transition-colors">Converter</button>
            <button onclick="filterTools('seguranca')"
                class="filter-btn bg-white text-gray-600 px-4 py-2 rounded-full text-sm font-medium hover:bg-gray-100 transition-colors">Segurança</button>
        </div>
    </section>

    <main class="container mx-auto px-4 pb-20">
        <div id="tools-grid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6 max-w-6xl mx-auto">
            <!-- Card Organizar PDF (SERÁ INSERIDO DINAMICAMENTE PELO SCRIPT.JS OU HARDCODED AQUI) -->
            <!-- Vamos deixar o script.js renderizar os cards baseados na config, 
                 mas caso a config dependa de HTML existente, precisamos garantir.
                 Na estrutura atual do script.js (vendo o arquivo original no dump anterior),
                 parece que ele renderiza *dentro* do #tools-grid. 
                 Vou verificar o script.js antes de alterar o HTML dos cards, 
                 mas vou adicionar o tag <script> do novo módulo no final. -->
        </div>
    </main>

    <div id="upload-container" class="hidden container mx-auto px-4 pb-20 max-w-4xl animate-fade-in">
        <button id="back-btn"
            class="mb-6 flex items-center text-gray-600 hover:text-red-600 transition-colors font-medium">
            <svg class="w-5 h-5 mr-2" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 19l-7-7m0 0l7-7m-7 7h18">
                </path>
            </svg>
            Voltar para todas as ferramentas
        </button>

        <div class="bg-white border-2 border-dashed border-gray-300 rounded-3xl p-16 text-center hover:border-red-400 transition-colors cursor-pointer"
            id="drop-zone">
            <div class="flex flex-col items-center">
                <div id="tool-icon-placeholder" class="mb-6">
                </div>
                <h2 id="tool-title-active" class="text-3xl font-bold text-gray-800 mb-2">Ferramenta</h2>
                <p class="text-gray-500 mb-8">Arraste os arquivos para cá ou clique para selecionar</p>

                <button
                    class="bg-red-600 text-white px-8 py-4 rounded-xl text-xl font-bold shadow-lg hover:bg-red-700 transform hover:scale-105 transition-all">
                    Selecionar arquivos
                </button>

                <input type="file" id="file-input" class="hidden" multiple accept=".pdf,.jpg,.jpeg,.png">
            </div>
        </div>

        <div id="file-list" class="mt-8 grid grid-cols-2 md:grid-cols-4 lg:grid-cols-6 gap-4 w-full hidden">
        </div>

        <div class="mt-8 flex justify-center">
            <button id="process-btn"
                class="hidden bg-gray-800 text-white px-10 py-4 rounded-xl text-xl font-bold shadow-lg hover:bg-gray-900 transition-all flex items-center">
                Processar Arquivos
                <svg class="w-6 h-6 ml-2" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M14 5l7 7m0 0l-7 7m7-7H3">
                    </path>
                </svg>
            </button>
        </div>
    </div>

    <script src="/visual/js/script.js"></script>
    <script src="/visual/js/modules/split_ui.js"></script>
    <script src="/visual/js/modules/merge_ui.js"></script>
    <script src="/visual/js/modules/compress_ui.js"></script>
    <script src="/visual/js/modules/image_ui.js"></script>
    <script src="/visual/js/modules/word_ui.js"></script>
    <script src="/visual/js/modules/organize_ui.js"></script>
</body>

</html>
